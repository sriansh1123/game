<!DOCTYPE html>
<html>
<head>
  <title>Games</title>
  <link rel="stylesheet" href="style.css">
  <script src="/launch/blob-proxy.js"></script>
  <style>
    body { margin:0; padding-bottom:70px; background:#111; color:#fff; font-family:sans-serif; }
    h1 { padding:20px; }
    .games { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:15px; padding:20px; }
    .card { background:#222; border-radius:10px; overflow:hidden; transition:transform .2s; text-decoration:none; color:#fff; }
    .card:hover { transform:scale(1.05); }
    .card img { width:100%; height:150px; object-fit:cover; display:block; }
    .card p { margin:0; padding:10px; text-align:center; }
    .navbar { position:fixed; bottom:0; left:0; width:100%; display:flex; justify-content:space-around; background:#000; border-top:1px solid #333; padding:10px 0; }
    .navbar a { color:#fff; text-decoration:none; padding:8px 16px; border-radius:6px; }
    .navbar a:hover { background:#333; }
  </style>
</head>
<body>
  <h1>Games</h1>
  <div class="games">
    <a class="card" href="/games/slope.html"><img src="/games/slope/thumb.png"><p>Slope</p></a>
    <a class="card" href="/games/run3.html"><img src="/games/run3/thumb.png"><p>Run 3</p></a>
  </div>

  <div class="navbar">
    <a href="/">Home</a>
    <a href="/game.html">Games</a>
    <a href="/anime.html">Anime</a>
    <a href="/manga.html">Manga</a>
    <a href="/settings.html">Settings</a>
  </div>
</body>
</html>
