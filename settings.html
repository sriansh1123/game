<!DOCTYPE html>
<html>
<head>
  <title>Settings</title>
  <script src="/launch/blob-proxy.js"></script>
  <link rel="stylesheet" href="../css/settings.css">
</head>
<body>
  <h1>Settings</h1>
  <a href="/" onclick="localStorage.setItem('blobMode','on')">
    <button>Turn My Site Into Blob</button>
  </a>
  <button onclick="localStorage.removeItem('blobMode'); window.location.replace(location.origin + '/')">Stop Blob Mode</button>
</body>
</html>
