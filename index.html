<!DOCTYPE html>
<html lang="en">
<head>
<script>
  const __errs = [];
  function __dump() { if (__errs.length) alert("ERRORS:\n\n" + __errs.join("\n\n---\n\n")); }
  window.addEventListener("error", e => __errs.push("ERROR: " + e.message + "\nFILE: " + e.filename + ":" + e.lineno));
  window.addEventListener("unhandledrejection", e => __errs.push("PROMISE REJECT: " + (e.reason && e.reason.message ? e.reason.message : e.reason)));
  setTimeout(__dump, 6000);
</script>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Game Hub</title>
<link rel="stylesheet" href="/style.css" />
<script src="/uv/uv.bundle.js"></script>
<script src="/uv/uv.config.js"></script>
</head>
<body>
<a class="gear" href="/settings.html" title="Settings">&#9881;</a>
<div id="home" class="home">
  <h1 class="title">Game Hub</h1>
  <input id="search" class="search" type="text" placeholder="Search..." autocomplete="off" />
  <div class="hint">Press <kbd>Ctrl</kbd>+<kbd>Y</kbd> to focus search</div>
  <div class="panel">
    <div class="panel-h">Quick apps</div>
    <div class="grid">
      <button class="tile" data-url="/quick%20apps/YouTube.html"><img src="https://cdn.simpleicons.org/youtube/white" alt=""><span>YouTube</span></button>
      <button class="tile" data-url="https://github.com"><img src="https://cdn.simpleicons.org/github/white" alt=""><span>GitHub</span></button>
      <button class="tile" data-url="/quick%20apps/discord.html"><img src="https://cdn.simpleicons.org/discord/white" alt=""><span>Discord</span></button>
      <button class="tile" data-url="https://www.tiktok.com"><img src="https://cdn.simpleicons.org/tiktok/white" alt=""><span>TikTok</span></button>
      <button class="tile" data-url="https://google.com"><img src="https://cdn.simpleicons.org/google/white" alt=""><span>Google</span></button>
      <button class="tile" data-url="https://twitter.com"><img src="https://cdn.simpleicons.org/x/white" alt=""><span>Twitter/X</span></button>
      <button class="tile" data-url="/quick%20apps/roblox.html"><img src="https://cdn.simpleicons.org/roblox/white" alt=""><span>Roblox</span></button>
      <button class="tile" data-url="https://nvidia.com/en-us/geforce-now/"><img src="https://cdn.simpleicons.org/nvidia/white" alt=""><span>GeForce</span></button>
      <button class="tile" data-url="/quick%20apps/movies.html"><img src="https://cdn.simpleicons.org/netflix/white" alt=""><span>Movies</span></button>
      <button class="tile" data-url="/game.html"><img src="https://cdn.simpleicons.org/steam/white" alt=""><span>Games</span></button>
      <button class="tile" data-url="/anime.html"><img src="https://cdn.simpleicons.org/myanimelist/white" alt=""><span>Anime</span></button>
      <button class="tile" data-url="/manga.html"><img src="https://cdn.simpleicons.org/bookstack/white" alt=""><span>Manga</span></button>
      <button class="tile" data-url="https://chat.openai.com"><img src="https://cdn.simpleicons.org/openai/white" alt=""><span>AI</span></button>
      <button class="tile" data-url="/quick%20apps/spotify.html"><img src="https://cdn.simpleicons.org/spotify/white" alt=""><span>Music</span></button>
    </div>
  </div>
</div>
<div id="browser" class="browser hidden"><iframe id="frame" src="about:blank" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox allow-storage-access-by-user-activation"></iframe></div>
<div id="edge" class="edge"></div>
<div id="bar" class="bar">
  <button id="btnHome" title="Home">&#127968;</button>
  <button id="btnBack" title="Back">&#8592;</button>
  <button id="btnFwd"  title="Forward">&#8594;</button>
  <button id="btnReload" title="Reload">&#8635;</button>
  <input id="urlBar" class="urlbar" type="text" placeholder="Search or type URL" />
  <span class="grip">^ Browser Controls</span>
</div>
<script>
  const home=document.getElementById("home"),browser=document.getElementById("browser"),frame=document.getElementById("frame"),urlBar=document.getElementById("urlBar"),search=document.getElementById("search"),bar=document.getElementById("bar"),edge=document.getElementById("edge");
  const hasUV = typeof __uv$config !== "undefined";
  let swReady = false;

  if (!hasUV) { __errs.push("FAIL 1: __uv$config not loaded."); }
  else if (!("serviceWorker" in navigator)) { __errs.push("FAIL 2: No SW support."); }
  else {
    (async () => {
      const reg = await navigator.serviceWorker.register("/uv/sw.js", { scope: "/" });
      await new Promise(resolve => {
        if (reg.active && reg.active.state === "activated") return resolve();
        const w = reg.installing || reg.waiting || reg.active;
        w.addEventListener("statechange", () => {
          if (w.state === "activated") resolve();
          if (w.state === "redundant") { __errs.push("SW BECAME REDUNDANT"); resolve(); }
        });
      });
      if (!navigator.serviceWorker.controller && !sessionStorage.getItem("swReloaded")) {
        sessionStorage.setItem("swReloaded","1");
        location.reload();
        return;
      }
      sessionStorage.removeItem("swReloaded");
      swReady = true;
    })().catch(err => __errs.push("FAIL 3: " + err.name + " - " + err.message));
  }

  function buildTarget(q){const isUrl=/^https?:\/\//i.test(q)||/\.[a-z]{2,}$/i.test(q);if(isUrl&&!/^https?:\/\//i.test(q))q="https://"+q;return isUrl?q:"https://duckduckgo.com/?q="+encodeURIComponent(q);}
  function toProxied(url){return __uv$config.prefix+__uv$config.encodeUrl(url);}
  async function openInside(url,attempt=0){
    if(url.startsWith("/")){location.href=url;return;}
    if(!hasUV)return;
    if(!swReady && attempt<50){setTimeout(()=>openInside(url,attempt+1),100);return;}
    if(!swReady){alert("SW never became ready.");return;}
    if(!navigator.serviceWorker.controller){alert("Hard refresh once more.");return;}
    home.classList.add("hidden");browser.classList.remove("hidden");
    frame.src=toProxied(url);urlBar.value=url;
  }
  document.querySelectorAll(".tile").forEach(t=>t.addEventListener("click",()=>{if(t.dataset.url){if(t.dataset.url.startsWith("/"))location.href=t.dataset.url;else openInside(t.dataset.url);}}));
  search.addEventListener("keydown",e=>{if(e.key==="Enter"&&search.value.trim())openInside(buildTarget(search.value.trim()));});
  urlBar.addEventListener("keydown",e=>{if(e.key==="Enter"&&urlBar.value.trim())openInside(buildTarget(urlBar.value.trim()));});
  window.addEventListener("keydown",e=>{if(e.ctrlKey&&e.key.toLowerCase()==="y"){e.preventDefault();search.focus();}});
  document.getElementById("btnHome").onclick=()=>{browser.classList.add("hidden");home.classList.remove("hidden");frame.src="about:blank";};
  document.getElementById("btnBack").onclick=()=>{try{frame.contentWindow.history.back();}catch(e){}};
  document.getElementById("btnFwd").onclick=()=>{try{frame.contentWindow.history.forward();}catch(e){}};
  document.getElementById("btnReload").onclick=()=>{try{frame.contentWindow.location.reload();}catch(e){frame.src=frame.src;}};
  edge.addEventListener("mouseenter",()=>bar.classList.add("show"));
  bar.addEventListener("mouseleave",()=>bar.classList.remove("show"));
</script>
</body>
</html>
